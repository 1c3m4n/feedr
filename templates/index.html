<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feedr</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; color: #333; }
        .user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .user a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        .user a:hover { color: #333; }
        .container {
            max-width: 960px;
            margin: 48px auto;
            padding: 0 24px;
            text-align: center;
        }
        .container h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 16px;
        }
        .container p {
            color: #666;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>feedr</h1>
        <div class="user">
            {% if user.picture %}
            <img src="{{ user.picture }}" alt="{{ user.name }}">
            {% endif %}
            <span>{{ user.name or user.email }}</span>
            <a href="/logout">Logout</a>
        </div>
    </div>
    <div class="container">
        <h2>Welcome back, {{ user.name or user.email }}!</h2>
        <p>Your feed reader is coming soon. Start adding feeds to see content here.</p>
    </div>
</body>
</html>
